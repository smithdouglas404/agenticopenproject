---
name: OpenProject – Full Stack Energy Profile
author: OpenProject GmbH
description: >
  Measures the energy consumption of a production-like OpenProject
  all-in-one container (web, worker, PostgreSQL, memcached) under a
  simulated user session. Build the image first, then run with GMT:
    docker build -f docker/prod/Dockerfile --target all-in-one -t openproject-aio:local .
    python3 runner.py --uri .

services:
  openproject:
    image: openproject-aio:local
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
      target: all-in-one
    ports:
      - "8080:80"
    environment:
      SECRET_KEY_BASE: green-metrics-static-key-do-not-use-in-production
      OPENPROJECT_HTTPS: "false"

flow:
  - name: Wait for application health
    container: openproject
    commands:
      - type: console
        command: >
          timeout 300 bash -c
          'until curl -sf http://localhost/health_checks/all > /dev/null 2>&1; do sleep 5; done'
        note: Wait for all services (PostgreSQL, Rails, memcached) to become healthy

  - name: Load homepage
    container: openproject
    commands:
      - type: console
        command: curl -sf http://localhost/
        note: Simulate a user loading the landing page

  - name: API v3 root
    container: openproject
    commands:
      - type: console
        command: curl -sf http://localhost/api/v3
        note: Fetch API root endpoint to exercise JSON serialization

  - name: List projects
    container: openproject
    commands:
      - type: console
        command: curl -sf http://localhost/api/v3/projects
        note: List all projects via the API

  - name: Create a work package
    container: openproject
    commands:
      - type: console
        command: >
          curl -sf -X POST http://localhost/api/v3/work_packages
          -H "Content-Type: application/json"
          -d '{"subject":"Green Metrics smoke test","_links":{"type":{"href":"/api/v3/types/1"},"project":{"href":"/api/v3/projects/demo-project"}}}'
        note: Create a work package to exercise a write path through the full stack
