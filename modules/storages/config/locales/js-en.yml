        remove_short: "Remove link"
        select: "Select files"
        select_all: "Select all"
        selection:
          one: "Link 1 file"
          other: "Link %{count} files"
          zero: "Select files to link"
        success_create:
          one: "Successfully created 1 file link."
          other: "Successfully created %{count} file links."
        tooltip:
          not_found: "This file cannot be found."
          not_logged_in: "Please log in to the storage to access this file."
          view_not_allowed: "You have no permission to see this file."
        upload_error:
          403: >-
            Your file (%{fileName}) could not be uploaded due to system restrictions. Please contact your administrator for
            more information.
          413: >-
            Your file (%{fileName}) is bigger than what OpenProject can upload to %{storageType}. You can upload it directly
            to %{storageType} first and then link the file.
          507: >-
            Your file (%{fileName}) is bigger than the storage quota allows. Contact your administrator to modify this quota.
          default: >-
            Your file (%{fileName}) could not be uploaded.
          detail:
            nextcloud: >-
              Please check that the latest version of the Nextcloud App "OpenProject Integration" is installed and contact
              your administrator for more information.
      files:
        already_existing_body: >-
          A file with the name "%{fileName}" already exists in the location where you are trying to upload this file. What
          would you like to do?
        already_existing_header: "This file already exists"
        cannot_create_folder: >-
          Failed to create folder. Avoid using special characters and symbols and make sure the folder does not exist already.
        directory_not_writeable: "You do not have permission to add files to this folder."
        dragging_folder: "The upload to %{storageType} does not support folders."
        dragging_many_files: "The upload to %{storageType} supports only one file at once."
        empty_folder: "This folder is empty."
        empty_folder_location_hint: "Click the button below to upload the file to this location."
        file_not_selectable_location: "Selecting a file is not possible in the process of choosing a location."
        managed_project_folder_no_access: >-
          You have no access yet to the managed project folder. Please wait a bit and try again.
        managed_project_folder_not_available: >-
          The automatically managed project folder was not yet found. Please wait a bit, reload the page to fetch the newest
          data, and try again.
        project_folder_no_access: >-
          You have no access to the project folder. Please, contact your administrator to get access or upload the file in
          another location.
        upload_keep_both: "Keep both"
        upload_replace: "Replace"

      information:
        authentication_error: "The request to %{storageType} could not be authenticated, that's an error."
