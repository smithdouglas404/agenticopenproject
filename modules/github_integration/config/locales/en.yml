  text_deploy_target_api_key_info: >-
    An OpenProject [API key](docs_url) belonging to a user who has the global introspection permission.
  text_deploy_target_type_info: >-
    So far we only support OpenProject itself.
  text_github_comment_user_info: >-
    The OpenProject user whose API key must be used to authenticate incoming webhook requests. When set, requests authenticated
    with any other user's credentials are rejected. This user also posts automated deploy-status comments on work packages.
    Defaults to the system user when not set.
  text_github_webhook_secret_info: >-
    A secret token shared with GitHub when configuring the webhook. When set, OpenProject verifies the X-Hub-Signature-256
    header on every incoming request, rejecting payloads that do not match. Leave blank to skip verification (not recommended).

  text_github_webhook_secret_missing_warning: >-
    No webhook secret is configured. Any request to the GitHub webhook endpoint will be accepted without verification, which
    may allow unauthorized actors to forge events. It is strongly recommended to set a secret.
  text_pull_request_deployed_to: "%{pr_link} deployed to %{deploy_target_link}"
