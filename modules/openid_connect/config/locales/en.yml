    groups:
      match_preview_component:
        placeholder_none: No groups currently match the pattern.
        title: Extracted group names
      match_preview_dialog_component:
        description: >-
          This allows you to test your regular expression pattern against sample data to verify that the group names you want
          extracted are indeed extracted properly. You can modify your pattern here but the test string and matches themselves
          will not be saved with the configuration.
        group_names_description: >-
          Enter one group name per line as it would appear in the OIDC claim, to see how your regular expression patterns
          affect them.
        group_names_label: Test group names
        show_button: Test pattern
        title: Test regular expressions

    instructions:
      acr_values: >-
        Request non-essential claims in an easier format. See [our documentation on acr_values](docs_url) for more information.
      claims: >-
        You can request additional claims for the userinfo and id token endpoints. Please see [our OpenID connect documentation](docs_url)
        for more information.
      client_id: This is the client ID given to you by your OpenID Connect provider
      client_secret: This is the client secret given to you by your OpenID Connect provider
      display_name: The name of the provider. This will be displayed as the login button and in the list of providers.
      endpoint_url: The endpoint URL given to you by the OpenID Connect provider
      group_regexes: >-
        One regular expression pattern per line. Please read [the documentation](docs_url) for more information on how to
        do this.
      group_regexes_detail: >-
        Optionally define patterns using regular expressions to match group names from the groups claim. For example, entering
        a pattern like <code>^Level1/Level2/([\w/]+)$</code> will extract the group “Groupname/SubGroup” from a response including
        “Level1/Level2/GroupName/SubGroup”. If no pattern matches, the group is ignored. Leave empty to synchronize all groups
        using their full group name.
      group_regexes_testing: "Click on 'Test pattern' to test your regular expression pattern against sample OIDC userinfo."
      group_sync: Automatically extract and synchronise group membership information from the identity provider.
      groups_claim: >-
        Specify the name of the claim that's expected to indicate the group names that the user is a member of.
      limit_self_registration: >-
        If enabled, users can only register using this provider if configuration on the provider's end allows it.
      mapping_admin: >-
        Provide a custom mapping in the userinfo response to be used for the admin status. It expects a boolean attribute
        to be returned.
      mapping_email: >-
        Provide a custom mapping in the userinfo response to be used for the email attribute.
      mapping_first_name: >-
        Provide a custom mapping in the userinfo response to be used for the first name.
      mapping_last_name: >-
        Provide a custom mapping in the userinfo response to be used for the last name.
      mapping_login: >-
        Provide a custom mapping in the userinfo response to be used for the login attribute.
