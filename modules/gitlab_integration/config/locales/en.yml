en:
  activerecord:
    attributes:
      gitlab_merge_request:
        labels: "Labels"
      gitlab_pipeline:
        ci_details: "CI Details"
    errors:
      models:
        gitlab_issue:
          attributes:
            labels:
              invalid_schema: "must be an array of hashes with keys: color, title"
        gitlab_merge_request:
          attributes:
            labels:
              invalid_schema: "must be an array of hashes with keys: color, title"

  attributes:
    commit: "Commit"
    gitlab: "GitLab identifier"
    gitlab_avatar_url: "Avatar URL"
    gitlab_email: "GitLab Email"
    gitlab_html_url: "GitLab HTML URL"
    gitlab_merge_request: "Merge Request"
    gitlab_name: "GitLab name"
    gitlab_updated_at: "Updated at"
    gitlab_user_avatar_url: "GitLab avatar URL"
    gitlab_username: "GitLab username"
  gitlab_integration:
    issue_closed_referenced_comment: >-
      **Issue Closed:** Issue %{issue_number} [%{issue_title}](%{issue_url}) for [%{repository}](%{repository_url}) has been
      closed by [%{gitlab_user}](%{gitlab_user_url}).
    issue_opened_referenced_comment: >-
      **Issue Opened:** Issue %{issue_number} [%{issue_title}](%{issue_url}) for [%{repository}](%{repository_url}) has been
      opened by [%{gitlab_user}](%{gitlab_user_url}).
    issue_reopened_referenced_comment: >-
      **Issue Reopened:** Issue %{issue_number} [%{issue_title}](%{issue_url}) for [%{repository}](%{repository_url}) has
      been reopened by [%{gitlab_user}](%{gitlab_user_url}).
    merge_request_closed_comment: >-
      **MR Closed:** Merge request %{mr_number} [%{mr_title}](%{mr_url}) for [%{repository}](%{repository_url}) has been closed
      by [%{gitlab_user}](%{gitlab_user_url}).
    merge_request_merged_comment: >-
      **MR Merged:** Merge request %{mr_number} [%{mr_title}](%{mr_url}) for [%{repository}](%{repository_url}) has been merged
      by [%{gitlab_user}](%{gitlab_user_url}).
    merge_request_opened_comment: >-
      **MR Opened:** Merge request %{mr_number} [%{mr_title}](%{mr_url}) for [%{repository}](%{repository_url}) has been opened
      by [%{gitlab_user}](%{gitlab_user_url}).
    merge_request_reopened_comment: >-
      **MR Reopened:** Merge request %{mr_number} [%{mr_title}](%{mr_url}) for [%{repository}](%{repository_url}) has been
      reopened by [%{gitlab_user}](%{gitlab_user_url}).
    note_commit_referenced_comment: >-
      **Referenced in Commit:** [%{gitlab_user}](%{gitlab_user_url}) referenced this WP in a Commit Note [%{commit_id}](%{commit_url})
      on [%{repository}](%{repository_url}): %{commit_note}
    note_issue_commented_comment: >-
      **Commented in Issue:** [%{gitlab_user}](%{gitlab_user_url}) commented this WP in Issue %{issue_number} [%{issue_title}](%{issue_url})
      on [%{repository}](%{repository_url}): %{issue_note}
    note_issue_referenced_comment: >-
      **Referenced in Issue:** [%{gitlab_user}](%{gitlab_user_url}) referenced this WP in Issue %{issue_number} [%{issue_title}](%{issue_url})
      on [%{repository}](%{repository_url}): %{issue_note}
    note_mr_commented_comment: >-
      **Commented in MR:** [%{gitlab_user}](%{gitlab_user_url}) commented this WP in Merge Request %{mr_number} [%{mr_title}](%{mr_url})
      on [%{repository}](%{repository_url}): %{mr_note}
    note_mr_referenced_comment: >-
      **Referenced in MR:** [%{gitlab_user}](%{gitlab_user_url}) referenced this WP in Merge Request %{mr_number} [%{mr_title}](%{mr_url})
      on [%{repository}](%{repository_url}): %{mr_note}
    note_snippet_referenced_comment: >-
      **Referenced in Snippet:** [%{gitlab_user}](%{gitlab_user_url}) referenced this WP in Snippet %{snippet_number} [%{snippet_title}](%{snippet_url})
      on [%{repository}](%{repository_url}): %{snippet_note}
    push_multiple_commits_comment: >-
      **Pushed in MR:** [%{gitlab_user}](%{gitlab_user_url}) pushed multiple commits [%{commit_number}](%{commit_url}) to
      [%{repository}](%{repository_url}) at %{commit_timestamp}: %{commit_note}
    push_single_commit_comment: >-
      **Pushed in MR:** [%{gitlab_user}](%{gitlab_user_url}) pushed [%{commit_number}](%{commit_url}) to [%{repository}](%{repository_url})
      at %{commit_timestamp}: %{commit_note}
    push_single_commit_comment_with_ref: >-
      **Pushed in %{reference}:** [%{gitlab_user}](%{gitlab_user_url}) pushed [%{commit_number}](%{commit_url}) to [%{repository}](%{repository_url})
      at %{commit_timestamp}: %{commit_note}
  label_gitlab_actor: "GitLab actor"
  label_gitlab_integration: "GitLab Integration"
  label_gitlab_webhook_secret: "Webhook secret"
  permission_show_gitlab_content: "Show GitLab content"

  project_module_gitlab: "GitLab"
  text_gitlab_actor_info: >-
    The OpenProject user whose API key must be used to authenticate incoming webhook requests. When set, requests authenticated
    with any other user's credentials are rejected. This user also posts automated comments on work packages. Defaults to
    the system user when not set.
  text_gitlab_webhook_secret_info: >-
    A secret token shared with GitLab when configuring the webhook. When set, OpenProject verifies the X-Gitlab-Token header
    on every incoming request, rejecting payloads that do not match. Leave blank to skip verification (not recommended).
  text_gitlab_webhook_secret_missing_warning: >-
    No webhook secret is configured. Any request to the GitLab webhook endpoint will be accepted without verification, which
    may allow unauthorized actors to forge events. It is strongly recommended to set a secret.

