            caption: Этот проект может использовать только спринты, совместно используемые другими проектами.
            warning: Этот проект может использовать только общие спринты других проектов. Неиспользуемые спринты, созданные в этом проекте в прошлом, больше не будут видны.
          share_all_projects:
            label: Все проекты
            caption: Спринты, созданные в этом проекте, будут доступны для всех проектов в этом экземпляре. Если вы выберете эту опцию, она больше не будет доступна для других проектов.
            disabled_caption: Опция недоступна, поскольку проект "%{name}" в настоящее время совместно используется со всеми проектами, и только один проект может сделать это.
            disabled_caption_anonymous: Опция недоступна, поскольку в настоящее время другой проект совместно используется со всеми проектами, и только один проект может это сделать.
