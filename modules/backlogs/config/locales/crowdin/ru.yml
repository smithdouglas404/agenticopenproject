        must_be_in_planning: для начала работы необходимо выполнить планирование.
        only_one_active_sprint_allowed: для каждого проекта допускается только один активный спринт.
        dates_required: Для начала спринта необходимы даты начала и окончания.
      models:
        project:
          receiving_sprints: получает общие спринты. Собственные спринты создавать нельзя.
          attributes:
            sprint_sharing:
              share_all_projects_already_taken: не может быть установлен, потому что проект "%{name}" уже совместно используется со всеми проектами.
              share_all_projects_already_taken_anonymous: не может быть установлен, потому что другой проект уже совместно используется со всеми проектами.
