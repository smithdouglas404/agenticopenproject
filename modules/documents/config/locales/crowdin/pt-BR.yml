pt-BR:
  plugin_openproject_documents:
    name: "Documentos do OpenProject"
    description: "Um plugin OpenProject para permitir a criação de documentos em projetos."
  activerecord:
    errors:
      models:
        document_type:
          one_or_more_required: "Não é possível excluir o último tipo de documento"
    models:
      document: "Documento"
      documents: "Documentos"
    attributes:
      document:
        content_binary: "Conteúdo binário"
        title: "Título"
  activity:
    filter:
      document: "Documentos"
  default_doc_category_tech: "Documentação técnica"
  default_doc_category_user: "Documentação do usuário"
  enumeration_doc_categories: "Categorias de documento"
  documents:
    page_header:
      heading: "Todos os documentos"
      action_menu:
        document_actions: "Ações do documento"
        edit_title: "Editar título"
    subheader:
      filter:
        label: "Filtro por nome do documento"
        placeholder: "Digite aqui para buscar nomes de documentos"
    documents_list_blank_slate:
      heading: "Ainda não há documentos"
      description: "Não há documentos nesta visualização. Você pode clicar no botão abaixo para adicionar um."
    document_categories_deprecation_notice:
      heading: As categorias de arquivos agora são chamadas 'Tipos de Documento'
      description: |-
        Suas categorias de arquivos existente foram convertidas em tipos de documento com a introdução do novo módulo Documentos. 
        Todos os documentos existentes também foram migrados para esses novos tipos.
      primary_action: Configure o tipo do documento
      secondary_action: Saiba mais sobre o módulo Documentos
    document_type_actions: "Ações do tipo de Documento"
    text_collaboration_disabled_notice:
      description: |-
        Não foi possível abrir o documento porque a colaboração de texto em tempo real está desativada.
        Entre em contato com o administrador para ativar a colaboração de texto em tempo real se você quiser acessar este documento.
    show_edit_view:
      connection_error_notice:
        description: |-
          Não foi possível abrir o documento porque o servidor de colaboração de texto em tempo real está inacessível.
          Contate o administrador se o problema persistir.
        action: Tente novamente
      connection_recovery_notice:
        description: "A conexão para o servidor de colaboração de texto em tempo real foi restaurada."
    index_page:
      name: "Nome"
      type: "Tipo"
      updated_at: "Última edição"
      label_legacy: "Legado"
    menu:
      all: "Todos os documentos"
      types: "Tipos"
      collaboration_settings: "Colaboração em tempo real"
    last_updated_at: "Last saved %{time}."
    active_editors: "Editores ativos"
    active_editors_count:
      one: "1 active editor"
      other: "%{count} active editors"
    label_attachment_author: "Autor do anexo"
    label_categories: "Categorias"
    new_category: "Nova categoria"
    new_type: "Novo tipo"
    delete_dialog:
      title: "Deletar documento"
      heading: "Deletar este documento?"
      confirmation_message_html: "Isso deletará permanentemente este documento e todos os arquivos anexados. Você tem certeza que deseja fazer isso?"
    delete_document_type_dialog:
      title: Deletar tipo de documento
      heading: Delete this document type?
      confirmation_message: |-
        The type "%{type_name}" is currently unused. Deleting this type will have no effect on existing documents.
      select_reassign_to_label: Reassign documents to
      reassign_message:
        one: The type "%{type_name}" is currently being used in %{document_count} document. Please select which type to reassign them to.
        other: The type "%{type_name}" is currently being used in %{document_count} documents. Please select which type to reassign them to.
      at_least_one_type_required:
        title: Cannot delete document type
        heading: Cannot delete the last document type
        message: There must always be at least one document type configured. Create another one first if you want to delete this one.
    admin:
      collaboration_settings:
        page_header:
          description: |-
            When enabled, real-time collaboration allows multiple users to edit a document at the same time.
            It requires a working %{hocuspocus_server_link} to function.
        banner:
          none_writable: These values are configured via environment variables and cannot be edited here.
          some_unwritable: Some values are configured via environment variables and cannot be edited here.
        hocuspocus_server_url:
          label: "Hocuspocus server URL"
          caption: "The address of a working Hocuspocus server."
        hocuspocus_server_secret:
          label: "Client secret"
          caption: "Paste the secret provided by the Hocuspocus server."
        hocuspocus_server: Hocuspocus server
      enable_text_collaboration:
        heading: Real-time collaboration is not enabled
        description: |-
          Once enabled, multiple users will be able to work together on a document at the same time.
          All new documents will be based on a new editor (BlockNote) and will require a working connection to a
          Hocuspocus server.
        primary_action: Enable real-time collaboration
        success: Real-time collaboration has been enabled.
      disable_text_collaboration_dialog:
        title: Disable real-time collaboration
        heading: Disable real-time collaboration?
        confirmation_message: |-
          All existing documents may become inaccessible. Please only do this if you are certain you want to disable
          real-time collaboration and the BlockNote editor in this instance.
        confirmation_checkbox_message: I understand that I might permanently lose data
        success: Real-time collaboration has been disabled.
  label_document_added: "Documento adicionado"
  label_document_new: "Novo documento"
