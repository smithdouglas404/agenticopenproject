        heading: Cannot delete the last document type
        message: >-
          There must always be at least one document type configured. Create another one first if you want to delete this
          one.


        title: Cannot delete document type
      confirmation_message: |-
        The type "%{type_name}" is currently unused. Deleting this type will have no effect on existing documents.
      heading: Delete this document type?
      reassign_message:
        one: >-
          The type "%{type_name}" is currently being used in %{document_count} document. Please select which type to reassign
          them to.
        other: >-
          The type "%{type_name}" is currently being used in %{document_count} documents. Please select which type to reassign
          them to.
      select_reassign_to_label: Reassign documents to
      title: Delete document type
