# English strings go here for Rails i18n
en:
  plugin_openproject_recaptcha:
    name: "OpenProject ReCaptcha"
    description: "This module provides recaptcha checks during login."
  recaptcha:
    label_recaptcha: "reCAPTCHA"
    button_please_wait: 'Please wait ...'
    verify_account: "Verify your account"
    error_captcha: "Your account could not be verified. Please contact an administrator."
    settings:
      website_key: 'Website key'
      response_limit: 'Response limit for HCaptcha'
      response_limit_text: 'The maximum number of characters to treat the HCaptcha response as valid.'
      website_key_text: 'Enter the website key you created in the CAPTCHA service admin console for this domain.'
      website_key_warning: 'Depending on your chosen CAPTCHA service, this may also be known as "Site key".'
      secret_key: 'Secret key'
      secret_key_text: 'Enter the secret key you created in the CAPTCHA service admin console.'
      type: 'CAPTCHA service'
      type_disabled: 'Disable CAPTCHA'
      type_disabled_caption: 'Disables the captcha form.'
      type_v2: 'reCAPTCHA v2'
      type_v3: 'reCAPTCHA v3'
      type_caption: >
        If enabled, a captcha form will be rendered upon login for all users that have not verified a captcha yet.
        Choose from reCAPTCHA, a captcha system owned by Google, or alternative services.
      type_caption_instructions_html: >
        To get started, visit their [configuration instructions](service_link).
      type_recaptcha_caption: >
        Uses reCAPTCHA, a free service by Google.
      type_hcaptcha: 'HCaptcha'
      type_hcaptcha_caption: >
        Uses HCaptcha, a Google-free alternative that you can use if you do not want to use reCAPTCHA.
      type_turnstile: 'Cloudflare Turnstile™'
      type_turnstile_caption: >
        Uses Cloudflare Turnstile™, another alternative that is more convenient for users while still providing the same level of security.
