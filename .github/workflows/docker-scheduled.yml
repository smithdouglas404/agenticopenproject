name: Docker Scheduled Builds

on:
  # build dev and release branches daily
  schedule:
    - cron: "20 2 * * *" # Daily at 02:20
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    strategy:
      matrix:
        include:
          - branch: dev
            tags: "dev"
          - branch: release/16.2
            tags: "16.2-pre"
          - branch: release/16.1
            tags: "16.1-pre"
    uses: ./.github/workflows/docker.yml
    with:
      branch: ${{ matrix.branch }}
      tags: ${{ matrix.tags }}
    secrets: inherit