name: Dockerize

on:
  push:
    branches:
      - dev
      - release
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: "The tag to release. Note that this happens by default on the tag push. Only run this action when something went wrong!"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve checkout ref
        id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [[ "$EVENT_NAME" == 'workflow_dispatch' && -n "$INPUT_TAG" ]]; then
            # Allow "v16.3.0", "16.3.0" or "refs/tags/v16.3.0" as input
            RAW_TAG="${INPUT_TAG#refs/tags/}"
            echo "ref=refs/tags/$RAW_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Compute tags and branch
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF: ${{ steps.ref.outputs.ref }}
        run: |
          SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-8`

          if [[ "$REF" == refs/tags/* ]]; then
            REF_TYPE="tag"
            TAG_REF="${REF#refs/tags/}"
            # Normalize tag e.g. v16.3.0 => 16.3.0
            TAG_REF="${TAG_REF#v}"
            BRANCH_REF=""
          elif [[ "$REF" == refs/heads/* ]]; then
            REF_TYPE="branch"
            BRANCH_REF="${REF#refs/heads/}"
            TAG_REF="${BRANCH_REF}-${SHORT_SHA}"
          else
            echo "No tag or branch provided (ref=$REF)" >&2
            exit 1
          fi

          echo "ref_type=$REF_TYPE" | tee -a "$GITHUB_OUTPUT"
          echo "branch=$BRANCH_REF" | tee -a "$GITHUB_OUTPUT"
          echo "tag=$TAG_REF" | tee -a "$GITHUB_OUTPUT"

          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

          # also include SHA in version string
          sed -ri "s/\"version\": \"(.*)\"/\"version\": \"\1-$SHORT_SHA\"/g" package.json

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (BRANCH)
        if: steps.compute.outputs.ref_type == 'branch'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            openproject/hocuspocus:${{ github.ref_name }}-latest
            openproject/hocuspocus:${{ steps.compute.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (TAG)
        if: steps.compute.outputs.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            openproject/hocuspocus:latest
            openproject/hocuspocus:${{ steps.compute.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize build
        run: |

      - name: Generate GHA token
        id: generate-gha-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: opf
          repositories: saas-deploy

      - name: Set inputs JSON
        id: build-inputs
        env:
          HOCUSPOCUS_TAG: ${{ steps.compute.outputs.tag }}
          THIS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          inputs_json=$(jq -cn \
            --arg tag "$HOCUSPOCUS_TAG" \
            --arg url "$THIS_RUN_URL" \
            '{hocuspocus_image_tag: $tag, triggered_by_url: $url}')
          echo "inputs_json=$inputs_json" >> $GITHUB_OUTPUT

      - name: Deploy EDGE
        if: github.ref == 'refs/heads/dev'
        uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc
        with:
          workflow: edge-deploy-shards.yml
          repo: opf/saas-deploy
          ref: master
          inputs: ${{ steps.build-inputs.outputs.inputs_json }}
          token: "${{ steps.generate-gha-token.outputs.token }}"

      - name: Deploy STAGE
        if: github.ref == 'refs/heads/release'
        uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc
        with:
          workflow: stage-deploy-shards.yml
          repo: opf/saas-deploy
          ref: master
          inputs: ${{ steps.build-inputs.outputs.inputs_json }}
          token: "${{ steps.generate-gha-token.outputs.token }}"
