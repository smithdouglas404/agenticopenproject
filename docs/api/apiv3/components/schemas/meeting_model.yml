# Schema: MeetingModel
---
type: object
required:
  - _type
  - id
  - lockVersion
  - title
  - startTime
  - endTime
  - duration
  - createdAt
  - updatedAt
properties:
  _type:
    type: string
    enum:
      - Meeting
  id:
    type: integer
    description: Identifier of this meeting
    minimum: 1
  title:
    type: string
    description: The meeting's title
  location:
    type: string
    description: The meeting's location
  lockVersion:
    type: integer
    description: The version of the item as used for optimistic locking
  startTime:
    type: string
    format: date-time
    description: The scheduled meeting start time.
  endTime:
    type: string
    format: date-time
    description: The scheduled meeting start time.
  duration:
    type: number
    description: The meeting duration in hours.
  createdAt:
    type: string
    format: date-time
    description: Time of creation. Can be writable by admins with the `apiv3_write_readonly_attributes` setting enabled.
  updatedAt:
    type: string
    format: date-time
    description: Time of the most recent change to the meeting.
  _embedded:
    type: object
    required:
      - attachments
      - author
    properties:
      attachments:
        $ref: './attachments_model.yml'
      author:
        $ref: './user_model.yml'
      project:
        $ref: './project_model.yml'
  _links:
    type: object
    properties:
      self:
        allOf:
          - $ref: './link.yml'
          - description: |-
              This meeting

              **Resource**: Meeting
      author:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The user having created the meeting

              **Resource**: User
      project:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The project the meeting is in

              **Resource**: Project
      attachments:
        allOf:
          - $ref: './link.yml'
          - description: |-
              The attachment collection of this grid.

              **Resource**: AttachmentCollection
      addAttachment:
        allOf:
          - $ref: './link.yml'
          - description: |-
              Attach a file to the meeting

              # Conditions

              **Permission**: edit meeting
