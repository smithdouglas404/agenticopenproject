        URL Shortener.","content":"== Welcome to your wiki ==\n\nXWiki is the best
        tool to organize your knowledge. A //wiki// is organized in a hierarchy of
        //pages//. You can create multiple wikis, each with its own set of pages.\n\nXWiki
        can be used as a knowledge base (support, documentation, sales, etc.), for
        collaborative workspaces or even as a complete intranet.\n\n== The basics
        ==\n\nTo make the most out of your wiki, log-in and:\n\nUse the {{displayIcon
        name=\"pencil\"/}} button above to //edit// this page and start customizing
        your wiki to your needs.\n\nUse the {{displayIcon name=\"add\"/}} button above
        to //add// more pages to your wiki and create the //hierarchy// that best
        organizes your content.\n\nUse the {{displayIcon name=\"home\"/}} breadcrumbs
        located above the title to //navigate// inside your pages. It''s easy to get
        lost in a big wiki without them.\n\nYou can also use the [[Sandbox>>Sandbox.WebHome]]
        for more demo content and generally a place to experiment with your wiki''s
        features. \n\n {{box}}Learn more on how to use XWiki with the [[Getting Started
        Guide>>https://www.xwiki.org/xwiki/bin/view/Documentation/UserGuide/GettingStarted/WebHome]].{{/box}}\n\n(%
        class=\"row\" %)\n(((\n(% class=\"col-xs-12 col-sm-6\" %)\n(((\n== Extend
        your wiki ==\n\nTo extend the power and functionalities of your wiki with
        the features that //you// need, head over to the [[Extension Manager>>XWiki.XWikiPreferences||queryString=\"editor=globaladmin&section=XWiki.Extensions\"]]
        where you can search for and install extensions.\n\nTo browse through the
        900+ community contributed extensions available for XWiki, head over to the
        [[Extensions Repository>>https://extensions.xwiki.org]].\n)))\n\n(% class=\"col-xs-12
        col-sm-6\" %)\n(((\n== Create your application ==\n\nGo beyond the available
        extensions and define the //structure// of your data based on //your// needs,
        creating //your// own applications with [[App Within Minutes>>AppWithinMinutes]]
        (AWM). \n\nAWM will take care of making it easy for you and your users to
        create and manage the data.\n)))\n)))","clazz":null,"objects":null,"attachments":null,"hierarchy":{"items":[{"label":"xwiki","name":"xwiki","type":"wiki","url":"https://xwiki.local/bin/view/Main/"},{"label":"Main","name":"Main","type":"space","url":"https://xwiki.local/bin/view/Main/"},{"label":"WebHome","name":"WebHome","type":"document","url":"https://xwiki.local/bin/view/Main/"}]},"rights":[],"renderedContent":null}'
