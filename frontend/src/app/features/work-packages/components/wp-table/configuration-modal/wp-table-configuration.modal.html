<div
  class=" wp-table--configuration-modal loading-indicator--location"
  data-indicator-name="modal"
  >
  <div class="Overlay-header Overlay-header--large Overlay-header--divided">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">{{text.title}}</h1>
      </div>
    </div>
  </div>

  <div class="Overlay-body">

    @if (!!prependModalComponent) {
      <ng-container *ngComponentOutlet="prependModalComponent; injector: injector" />
    }

    @if (tabPortalHost) {
      <op-scrollable-tabs [tabs]="availableTabs"
        [currentTabId]="tabPortalHost.currentTab?.id"
        (tabSelected)="switchTo($event)"
         />
    }
    <div class="tab-content" #tabContentOutlet></div>
  </div>
  <div class="Overlay-footer Overlay-footer--alignEnd">
    <button
      class="Button Button--secondary Button--medium"
      [textContent]="text.cancelButton"
      (click)="closeMe($event)"
      >
    </button>
    <button
      class="Button Button--primary Button--medium"
      data-test-selector="Overlay-wp-table-configuration-save-button"
      (click)="saveChanges()"
      >
      <span class="Button-content">
        <span class="Button-label">{{ text.applyButton }}</span>
      </span> 
    </button>
  </div>
</div>
