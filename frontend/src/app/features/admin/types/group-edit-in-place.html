@if (!editing) {
  <div
    class="group-edit-handler"
    [textContent]="name"
    (click)="startEditing()">
  </div>
}
@if (editing) {
  <input
    #nameInput
    class="group-edit-in-place--input"
    opAutofocus
    type="text"
    [attr.placeholder]="placeholder"
    [(ngModel)]="editedName"
    (blur)="saveEdition($event)"
    (keydown.enter)="saveEdition($event)"
    (keydown.escape)="reset()">
}
