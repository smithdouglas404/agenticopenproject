<form
  class="Overlay loading-indicator--location"
  data-indicator-name="modal"
  name="modalSaveForm"
  (submit)="saveQueryAs($event)"
>
  <div class="Overlay-header Overlay-header--large Overlay-header--divided">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">{{text.save_as}}</h1>
      </div>
    </div>
  </div>

  <div
    name="modalSaveForm"
    class="Overlay-body"
  >
    <div class="FormControl-spacingWrapper">
      <op-text-field
        [label]="text.label_name"
        name="save-query-name"
        inputId="save-query-name"
        #queryNameField
        [(ngModel)]="queryName"
        required/>

    <query-sharing-form 
      [label]="text.label_visibility_settings"
      [isSave]="true"
      (onChange)="setValues($event)"
      [isStarred]="isStarred"
      [isPublic]="isPublic" />
      </div>
  </div>

  <div class="Overlay-footer Overlay-footer--alignEnd">
    <button
      type="button"
      class="Button Button--secondary Button--medium"
      (click)="closeMe($event)"
    >
      <span class="Button-content">
        <span class="Button-label">
          {{ text.button_cancel }}
        </span>
      </span>
    </button>
    <button
      class="Button Button--primary Button--medium"
      [disabled]="isBusy || !queryName"
    >
      <span class="Button-content">
        <span class="Button-label">
          {{ text.button_save }}
        </span>
      </span>
    </button>
  </div>
</form>
