<dialog

  class="Overlay op-confirm-dialog loading-indicator--location"
  data-indicator-name="modal"
  tabindex="0"
  cdkFocusInitial
  cdkTrapFocus
  [cdkTrapFocusAutoCapture]="true"
  >
  <div 
    id="spotModalTitle" 
    class="Overlay-header Overlay-header--large"
    [class.Overlay-header--divided]="divideContent">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">
          {{text.title}}
        </h1>
      </div>
    </div>
  </div>

  <div class="Overlay-body">
    <span class="op-confirm-dialog--text spot-body-small"
      [textContent]="text.text"
    ></span>

    @if (showListData) {
      <span class="op-confirm-dialog--text spot-body-small"
        [textContent]="listTitle"
      ></span>
      <ul class="op-confirm-dialog--list">
        @for (data of passedData; track data) {
          <li class="spot-body-small">
            <span>{{data}}</span>
          </li>
        }
      </ul>
    } @else {
      @for (data of passedData; track data) {
        <span
          class="spot-body-small"
          >
          <br/>
          <strong>{{data}}</strong>
        </span>
      }
    }


    <span class="op-confirm-dialog--text spot-body-small"
      [innerHtml]="warningText"
    ></span>

  </div>

  <div class="Overlay-footer Overlay-footer--alignEnd Overlay-footer--divided">
    <button
      type="button"
      class="Button--secondary Button--medium Button"
      data-test-selector="confirmation-modal--cancel"
      (click)="close($event)"
      >
      <span class="Button-content">
        <span class="Button-label">{{text.button_cancel}}</span>
      </span>
    </button>
    <button
      type="button"
      class="Button--medium Button"
      [class.Button--primary]="!dangerHighlighting"
      [class.Button--danger]="dangerHighlighting"
      data-test-selector="confirmation-modal--confirmed"
      (click)="confirmAndClose($event)"
      >
      <span class="Button-content">
        <span class="Button-visual Button-leadingVisual">
          @switch (icon.continue) {
            @case ('trash') {
              <svg trash-icon size="small"></svg>
            }
            @case ('unlink') {
              <svg unlink-icon size="small"></svg>
            }
          }
        </span>
        <span class="Button-label">{{text.button_continue}}</span>
      </span>
    </button>
  </div>
</dialog>
