<form
  class="Overlay Overlay_autoheight loading-indicator--location"
  (submit)="applyAndClose($event)"
  data-indicator-name="modal"
  >
  <div class="Overlay-header Overlay-header--large Overlay-header--divided">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">{{ text.title }}</h1>
      </div>
    </div>
  </div>

  <div class="Overlay-body form">
    <fieldset class="form--fieldset">
      <legend [textContent]="text.selected_type"></legend>
      <div class="form--field">
        <label
          for="selected-type"
          [textContent]="text.selected_type"
          class="form--label sr-only">
        </label>
        <div class="form--field-container">
          <div class="form--select-container">
            <select
              #typeSelect
              id="selected-type"
              tabindex="1"
              name="selected-type"
              (change)="selectedType = $event.target.value"
              class="form--select">
              <option [textContent]="text.none"
                [selected]="!selectedType"
              [value]=""></option>
              @for (type of availableTypes; track type) {
                <option
                  [textContent]="type.name"
                  [selected]="selectedType === type.name"
                [value]="type.name"></option>
              }
            </select>
          </div>
        </div>
      </div>
    </fieldset>

    <div class="form--field -wide-label">
      <div class="form--field-container -vertical">
        <label class="form--label-with-check-box">
          <div class="form--check-box-container">
            <input
              type="checkbox"
              tabindex="2"
              id="wp_button_macro_style"
              (change)="buttonStyle = $event.target.checked"
              [checked]="buttonStyle"
              name="button_style"
              />
          </div>
          {{ text.button_style }}
        </label>
      </div>
    </div>
    <p [textContent]="text.button_style_hint"></p>
  </div>

  <div class="Overlay-footer Overlay-footer--alignEnd">
    <button 
      type="button" 
      class="Button Button--secondary Button--medium"
      (click)="closeMe($event)">
      <span class="Button-content">
        <span class="Button-label">{{ text.button_cancel }}</span>
      </span>
    </button>
    <button class="Button Button--primary Button--medium">
      <span class="Button-content">
        <span class="Button-label">{{ text.button_save }}</span>
      </span> 
    </button>
  </div>
</form>
