<form
  class=" "
  (submit)="applyAndClose($event)"
>
  <div class="Overlay-header Overlay-header--large Overlay-header--divided">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">{{ text.title }}</h1>
      </div>
    </div>
  </div>

  <div class="Overlay-body">
    <textarea name="codemirror-element"
              id="codemirror-element"
              [ngModel]="content"
              #codeMirrorPane></textarea>
    <hr/>
    <div class="form--field">
      <label
        for="selected-language"
        [textContent]="text.language"
        class="form--label sr-only">
      </label>
      <div class="form--field-container">
        <div class="form--select-container">
          <input
            #selectedLanguage
            tabindex="2"
            type="text"
            id="selected-language"
            name="selected-language"
            [ngModel]="language"
            (ngModelChange)="updateLanguage($event)"
            class="form--select"/>
        </div>
      </div>
      <p [textContent]="text.language_hint"></p>
    </div>
  </div>

  <div class="Overlay-footer Overlay-footer--alignEnd">
    <button 
      type="button" 
      class="Button Button--secondary Button--medium"
      (click)="closeMe($event)">
      <span class="Button-content">
        <span class="Button-label">{{ text.button_cancel }}</span>
      </span>
    </button>
    <button class="Button Button--primary Button--medium">
      <span class="Button-content">
        <span class="Button-label">{{ text.button_save }}</span>
      </span> 
    </button>
  </div>
 </form>
