<dialog
  open
  class="Overlay loading-indicator--location"
  data-indicator-name="modal"
>
  <div class="Overlay-header Overlay-header--large Overlay-header--divided">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">{{text.label_visibility_settings}}</h1>
      </div>
    </div>
  </div>

  <query-sharing-form class="Overlay-body"
    [isSave]="false"
    (onChange)="setValues($event)"
    [isStarred]="isStarred"
    [isPublic]="isPublic" />

  <div class="Overlay-footer Overlay-footer--alignEnd">
    <button class="Button Button--secondary Button--medium" [disabled]="isBusy" (click)="closeMe($event)">
      <span class="Button-content">
        <span class="Button-label">{{ text.button_cancel }}</span>
      </span> 
    </button>

    <button class="Button Button--primary Button--medium" (click)="saveQuery($event)">
      <span class="Button-content">
        <span class="Button-label">{{ text.button_save }}</span>
      </span> 
    </button>
  </div>
</dialog>
