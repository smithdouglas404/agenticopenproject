<dialog
  open
  class="Overlay"
  data-test-selector="op-stop-existing-timer-modal"
>
  <div class="Overlay-header Overlay-header--large Overlay-header--divided">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">{{ text.title }}</h1>
        <h2 id="spotModalDescription" class="Overlay-description">{{ text.timer_already_running }}</h2>
      </div>
    </div>
  </div>

  <div class="Overlay-body spot-body-small">
    <p>
      <strong>{{ text.tracking_time }}: {{ elapsed$ | async }}</strong>
      <br/>
      <a
        uiSref="work-packages.show"
        [uiParams]="{ workPackageId: active.entity.id }"
        (click)="closeMe()"
      >
        #{{ active.workPackage.id }}: {{ active.workPackage.name }}
      </a>
    </p>

  </div>
  <div class="Overlay-footer Overlay-footer--alignEnd">
    <button 
      type="button" 
      class="Button Button--secondary Button--medium"
      (click)="closeMe()">
      <span class="Button-content">
        <span class="Button-label">{{ text.button_cancel }}</span>
      </span>
    </button>
    <button
      type="button"
      class="Button Button--primary Button--medium"
      data-test-selector="op-files-picker-modal--confirm"
      [textContent]="text.button_stop"
      (click)="saveAndClose()"
    >
    </button>
  </div>
 </dialog>
