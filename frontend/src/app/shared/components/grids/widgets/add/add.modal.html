<dialog
  open
  class="Overlay loading-indicator--location"
  data-indicator-name="modal"
  >
  <div class="Overlay-header Overlay-header--large Overlay-header--divided">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">{{ text.title }}</h1>
      </div>
    </div>
  </div>

  <div class="ngdialog-body Overlay-body">
    <ul class="spot-list">
      @for (widget of selectable; track trackWidgetBy($index, widget)) {
        <li
          class="spot-list--item"
          data-test-selector="op-grid--addable-widget">
          <button
            type="button"
            class="spot-list--item-action"
            (click)="select($event, widget)"
            [id]="widget.identifier"
            [textContent]="widget.title"
          ></button>
        </li>
      }
    </ul>
  </div>

  <div class="spot-action-bar hidden-for-mobile">
    <div class="Overlay-footer Overlay-footer--alignEnd">
      <button
        type="button"
        class="Button Button--secondary Button--medium"
        (click)="closeMe()"
        >
        {{ text.cancel_button }}
      </button>
    </div>
  </div>
</dialog>
