<dialog
  open
  class="Overlay"
  data-indicator-name="modal"
  tabindex="0">

  <div class="Overlay-header Overlay-header--large Overlay-header--divided">
    <div class="Overlay-headerContentWrap">
      <div class="Overlay-titleWrap">
        <h1 id="spotModalTitle" class="Overlay-title">{{ text.displayedDays }}</h1>
      </div>
    </div>
  </div>

  <div class="Overlay-body">
    @for (day of days; track day; let index = $index) {
      <div class="FormControl-checkbox-wrap">
        <input type="checkbox" [id]="'day_' + index" name="days" class="FormControl-checkbox" [(ngModel)]="day.checked">
        <span class="FormControl-checkbox-labelWrap">
          <label class="FormControl-label" [textContent]="day.weekDay" [htmlFor]="'day_' + index"></label>
        </span>
      </div>
    }
  </div>

  <div class="Overlay-footer Overlay-footer--alignEnd">
    <button
      class="Button Button--secondary Button--medium"
      [textContent]="text.cancelButton"
      (click)="closeMe($event)"
    ></button>
    <button
      class="Button Button--primary Button--medium"
      (click)="saveChanges()"
      >
      <span class="Button-content">
        <span class="Button-label">{{ text.applyButton }}</span>
      </span>
    </button>
  </div>
</dialog>
