  text_custom_logo_instructions: يتم تغيير حجم الشعار تلقائيًا ليناسب الرأس. للحصول على أفضل النتائج، ارفع شعارًا أبيض على صورة شفافة بحجم 130×47 بكسل. يمكنك إضافة مسافة بداخل الصورة كما تشاء.
  text_custom_logo_mobile_instructions: يتم تغيير حجم الشعار تلقائيًا ليناسب الرأس. للحصول على أفضل النتائج، ارفع شعارًا أبيض على صورة شفافة بحجم 130×33 بكسل. يمكنك إضافة مسافة بداخل الصورة كما تشاء.
  text_custom_export_logo_instructions: هذا هو الشعار الذي يظهر في صادرات PDF الخاصة بك. يجب أن يكون ملف صورة PNG أو JPEG. يُوصى بشعار أسود أو ملون على خلفية شفافة أو بيضاء.
  text_custom_export_cover_instructions: هذه هي الصورة التي تظهر في خلفية صفحة الغلاف في صادرات PDF الخاصة بك. يجب أن يكون ملف صورة PNG أو JPEG بعرض حوالي 800 بكسل وارتفاع 500 بكسل.
  text_custom_export_footer_instructions: ستتضمن صادرات PDF عنصرًا رسوميًا موضوعًا على يسار التذييل. يجب أن تكون هذه الصورة ملف PNG أو JPEG بعرض يقارب 200 بكسل.
  label_custom_export_font_instructions: ارفع وأدر خطوط TrueType (.ttf) المخصصة المستخدمة في صادرات PDF الخاصة بك. للحصول على أفضل النتائج، استخدم ملفات متطابقة من نفس عائلة الخطوط. إذا لم يتم توفير خط، سيتم استخدام خط NotoSans الافتراضي.
  label_custom_export_images_instructions: ارفع وأدر ملفات الصور المخصصة المستخدمة في صادرات PDF الخاصة بك.
  text_custom_export_font_regular_instructions: هذا هو ملف الخط للنص العادي. يجب أن يكون بتنسيق TTF وهو مطلوب.
  text_custom_export_font_bold_instructions: هذا هو ملف الخط للنص الغامق. يجب أن يكون بتنسيق TTF.
  text_custom_export_font_italic_instructions: هذا هو ملف الخط للنص المائل. يجب أن يكون بتنسيق TTF.
  text_custom_export_font_bold_italic_instructions: هذا هو ملف الخط للنص الغامق والمائل. يجب أن يكون بتنسيق TTF.
  text_custom_favicon_instructions: هذا هو الأيقونة الصغيرة التي تظهر في نافذة/علامة تبويب متصفحك بجانب عنوان الصفحة. يجب أن يكون ملف صورة PNG مربعة بحجم 32×32 بكسل بخلفية شفافة.
  text_custom_touch_icon_instructions: هذه هي الأيقونة التي تظهر على جهازك المحمول أو الجهاز اللوحي عند وضع إشارة مرجعية على شاشتك الرئيسية. يجب أن يكون ملف صورة PNG مربعة بحجم 180×180 بكسل. تأكد من أن خلفية الصورة ليست شفافة وإلا ستبدو سيئة على iOS.
