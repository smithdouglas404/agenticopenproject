        Deactivating this option will hide the attachments list on the work packages files tab for new projects. The files
        attached in the description of a work package will still be uploaded in the internal attachments storage.
      whitelist_text_html: >-
        Define a list of valid file extensions and/or mime types for uploaded files. <br/> Enter file extensions (e.g., <code>%{ext_example}</code>)
        or mime types (e.g., <code>%{mime_example}</code>). <br/> Leave empty to allow any file type to be uploaded. Multiple
        values allowed (one line for each value).
