  settings:
    antivirus:
      actions:
        delete: "Delete the file"
        instructions_html: >-
          Select the action to perform for files on which a virus has been detected: <br/> <ul> <li><strong>%{quarantine_option}</strong>:
          Quarantine the file, preventing users from accessing it. Administrators can review and delete quarantined files
          in the administration.</li> <li><strong>%{delete_option}</strong>: Delete the file immediately.</li> </ul>
        quarantine: "Quarantine the file"
      clamav_ping_failed: "Failed to connect the the ClamAV daemon. Double-check the configuration and try again."
      modes:
        clamav_host_html: Enter the hostname and port to the clamd daemon separated by colon. e.g., %{example}
        clamav_socket_html: Enter the socket to the clamd daemon, e.g., %{example}
        description_html: >-
          Select the mode in which the antivirus scanner integration should operate. <br/> <ul> <li><strong>%{disabled_option}</strong>:
          Uploaded files are not scanned for viruses.</li> <li><strong>%{socket_option}</strong>: You have set up ClamAV on
          the same server as OpenProject and the scan daemon clamd is running in the background</li> <li><strong>%{host_option}</strong>:
          You are streaming files to an external virus scanning host.</li> </ul>
      remaining_quarantined_files_html: >-
        Virus scanning has been disbled. %{file_count} remain in quarantine. To review quarantined files, please visit this
        link: %{link}
      remaining_rescanned_files: >-
        Virus scanning has been enabled successfully. There are %{file_count} that were uploaded previously and still need
        to be scanned. This process has been scheduled in the background. The files will remain accessible during the scan.
      remaining_scan_complete_html: >-
        Remaining files have been scanned. There are %{file_count} in quarantine. You are being redirected to the quarantine
        page. Use this page to delete or override quarantined files.
